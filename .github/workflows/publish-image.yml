name: Build, push and optionally sign Docker images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional image tag (overrides SHA). Example: v1.2.3'
        required: false

permissions:
  contents: read
  packages: write
  id-token: write     # needed for keyless cosign signing with OIDC

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      OWNER_LOWER: ${{ toLower(github.repository_owner) }}
      IMAGE_REPO: ghcr.io/${{ env.OWNER_LOWER }}/agent
      DOCKERHUB_REPO: docker.io/${{ toLower(github.repository_owner) }}/agent
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v2

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # prefer CR_PAT secret if present, otherwise use the GITHUB token
          password: ${{ secrets.CR_PAT || github.token }}

      - name: Optionally login to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tag(s) and sanitize branch/tag
        id: tag
        run: |
          # prefer manual workflow_dispatch input
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "release" ] || [ "${{ github.ref_type }}" = "tag" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            # tags should be used as-is but we'll lowercase and sanitize
            SANITIZED_TAG=$(echo "$TAG_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
            echo "IMAGE_TAG=$SANITIZED_TAG" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=${GITHUB_SHA::8}
            BRANCH=${GITHUB_REF#refs/heads/}
            BRANCH_SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
            DATE_TAG=$(date -u +'%Y%m%d%H%M%S')
            echo "IMAGE_TAG=$SHORT_SHA" >> $GITHUB_OUTPUT
            echo "BRANCH_TAG=$BRANCH_SANITIZED" >> $GITHUB_OUTPUT
            echo "DATE_TAG=$DATE_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Validate image name and tags (fail fast on invalid names)
        run: |
          set -euo pipefail
          IMAGE_REPO="${{ env.IMAGE_REPO }}"
          IMAGE_TAG="${{ steps.tag.outputs.IMAGE_TAG }}"
          echo "Validating image repo: $IMAGE_REPO and tag: $IMAGE_TAG"

          # Full tag to validate (allows one colon)
          FULL_TAG="$IMAGE_REPO:$IMAGE_TAG"

          # Check for uppercase letters
          if echo "$FULL_TAG" | grep -q '[A-Z]'; then
            echo "ERROR: Image name or tag contains uppercase letters. Docker image names and tags must be lowercase."
            echo "Offending: $FULL_TAG"
            exit 1
          fi

          # Check for invalid characters (allow lowercase letters, digits, ., _, -, /, and :)
          if echo "$FULL_TAG" | grep -q '[^a-z0-9._\-/:\]'; then
            # fallback grep for older shells that may not accept the above char class; run a safe check:
            if echo "$FULL_TAG" | grep -q '[^a-z0-9._\-/:]'; then
              echo "ERROR: Image name or tag contains invalid characters. Allowed: a-z, 0-9, ., _, -, /, :"
              echo "Offending: $FULL_TAG"
              exit 1
            fi
          fi

          echo "Image name and tag look valid."

      - name: Build and push (with registry cache)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.IMAGE_REPO }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_REPO }}:cache,mode=max
          tags: |
            ${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.BRANCH_TAG || '' }}
            ${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.DATE_TAG || '' }}
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ env.DOCKERHUB_REPO }}:latest

      - name: Sign image with cosign (keyless, optional)
        if: env.SIGN_IMAGE == 'true' || github.event_name == 'release'
        run: |
          # keyless signing with cosign via OIDC - repo/org must allow OIDC
          docker run --rm -e COSIGN_EXPERIMENTAL=1 -v $HOME/.docker:/root/.docker sigstore/cosign:latest sign --keyless ${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}

      - name: Post-push info
        run: |
          echo "Image pushed:"
          echo "  GHCR: ${{ env.IMAGE_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}"
          echo "  GHCR latest: ${{ env.IMAGE_REPO }}:latest"
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "  Docker Hub: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.IMAGE_TAG }}"
          fi
