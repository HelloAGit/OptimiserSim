fireworks:
  api_key_env: "fw_HdzvL2VGGBWG8BeM99kytV"
  base_url: "https://api.fireworks.ai/inference/v1"

models:
  - name: "accounts/fireworks/models/llama-v3p1-8b-instruct"
    price_per_million_input: 0.20
    price_per_million_output: 0.20
    min_accuracy_threshold: 0.75
    priority: 1
  
  - name: "accounts/fireworks/models/llama-v3p1-70b-instruct"
    price_per_million_input: 0.90
    price_per_million_output: 0.90
    min_accuracy_threshold: 0.90
    priority: 2
  
  - name: "accounts/fireworks/models/mixtral-8x7b-instruct"
    price_per_million_input: 0.50
    price_per_million_output: 0.50
    min_accuracy_threshold: 0.85
    priority: 3

routing:
  global_min_accuracy: 0.80
  max_routing_time_ms: 100
  default_fallback_model: "accounts/fireworks/models/llama-v3p1-70b-instruct"
  
monitoring:
  accuracy_window_size: 100  # Rolling window for accuracy calculation
  log_level: "INFO"
  
token_estimation:
  input_multiplier: 1.2  # Buffer for unexpected token growth
  output_multiplier: 1.5
